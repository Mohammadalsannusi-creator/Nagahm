<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل أجهزة جسم الإنسان | الذكاء الاصطناعي</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="دليل تعليمي تفاعلي ذكي لأجهزة جسم الإنسان مع دعم الوضع الداكن واختبارات AI.">
    
    <!-- Design & Tool Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">

    <script>
        // Tailwind Custom Dark Mode Config
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            card: '#1e293b',
                            border: '#334155'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-brand-dark dark:text-slate-100 antialiased overflow-hidden transition-colors duration-500">

    <!-- Screen Loader -->
    <div id="initial-loader" class="fixed inset-0 bg-white dark:bg-brand-dark z-[100] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="loader-spinner !w-16 !h-16"></div>
        <h2 class="mt-6 text-2xl font-bold text-slate-800 dark:text-slate-200">جاري تحميل المختبر الذكي...</h2>
    </div>

    <div id="app" class="min-h-screen flex flex-col opacity-0 transition-opacity duration-1000">
        
        <!-- Header / ترويسة الموقع -->
        <header class="sticky top-0 z-40 glass border-b border-slate-200 dark:border-brand-border py-4 px-6 shadow-sm">
            <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-500/30">
                        <i class="fas fa-lungs text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tight">أجهزة جسم الإنسان</h1>
                        <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest">Interactive AI Guide</p>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <!-- Dark Mode Toggle -->
                    <button onclick="app.toggleDarkMode()" class="p-3 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-blue-100 dark:hover:bg-blue-900/40 transition shadow-inner border border-transparent dark:border-brand-border">
                        <i id="theme-icon" class="fas fa-moon text-slate-600 dark:text-amber-400 transition-transform duration-500"></i>
                    </button>
                    
                    <button onclick="app.openQuizModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold transition shadow-lg shadow-blue-500/20 active:scale-95">
                        <i class="fas fa-brain"></i> <span class="hidden sm:inline">اختبار AI</span>
                    </button>
                    
                    <button onclick="app.generatePDF(this)" class="flex items-center gap-2 bg-rose-500 hover:bg-rose-600 text-white px-5 py-2.5 rounded-xl font-bold transition shadow-lg shadow-rose-500/20 active:scale-95">
                        <i class="fas fa-file-pdf"></i> <span class="hidden sm:inline">تنزيل PDF</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-12">
            <!-- Filter Buttons -->
            <div class="flex flex-wrap justify-center gap-2 mb-16" id="system-filters">
                <button onclick="app.filterSystem('All', this)" class="filter-btn active">الكل</button>
                <button onclick="app.filterSystem('Respiratory', this)" class="filter-btn bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-brand-border">التنفسي</button>
                <button onclick="app.filterSystem('Cardiovascular', this)" class="filter-btn bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-brand-border">الدوري</button>
                <button onclick="app.filterSystem('Digestive', this)" class="filter-btn bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-brand-border">الهضمي</button>
                <button onclick="app.filterSystem('Exercises', this)" class="filter-btn bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-brand-border">تمارين</button>
            </div>

            <!-- Content Area -->
            <div id="content-container" class="space-y-20 transition-all duration-500">
                <!-- Cards will be injected here -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-auto border-t border-slate-200 dark:border-brand-border py-8 px-4 text-center">
            <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">
                &copy; 2026 دليل أجهزة جسم الإنسان - التعليم التفاعلي المعتمد على AI
            </p>
        </footer>
    </div>

    <!-- AI Quiz Modal -->
    <div id="quiz-modal" class="modal-overlay fixed inset-0 bg-slate-900/80 z-50 hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="modal-content bg-white dark:bg-brand-card rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col max-h-[90vh] border border-slate-200 dark:border-brand-border">
            <div class="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-brand-dark/20">
                <h3 class="text-xl font-bold flex items-center gap-2 text-blue-600 dark:text-blue-400">
                    <i class="fas fa-magic"></i> تحدي الذكاء الاصطناعي
                </h3>
                <button onclick="app.closeQuizModal()" class="text-slate-400 hover:text-red-500 transition"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="quiz-body" class="p-8">
                <!-- Content Injected -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
